# ═══════════════════════════════════════════════════════════════════════════════
#  Yaksha FAQ Portal — Build & Deploy to Production
#  Inspired by vicharanashala/wa-client
#
#  Triggers:
#    • Push to `main` branch (auto build + deploy)
#    • Manual workflow_dispatch with build/deploy toggles
#
#  Required GitHub Secrets (configured per-environment or globally):
#    DOCKER_USERNAME      — Docker Hub account username (preferred)
#    DOCKER_PASSWORD      — Docker Hub access token (preferred)
#    DOCKERHUB_USERNAME   — Backward-compatible Docker Hub username fallback
#    DOCKERHUB_TOKEN      — Backward-compatible Docker Hub token fallback
#    PROD_SSH_HOST        — Production VPS hostname / IP
#    PROD_SSH_USER        — SSH username on production VPS
#    PROD_SSH_KEY         — SSH private key for production VPS
#    INFISICAL_TOKEN      — Infisical service token (production environment)
#    INFISICAL_PROJECT_ID — Infisical project ID
# ═══════════════════════════════════════════════════════════════════════════════

name: Build & Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      should_build:
        description: "Build and Push Images"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      should_deploy:
        description: "Deploy to Production VPS"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

env:
  BACKEND_IMAGE: csfaq-backend
  INFISICAL_ENVIRONMENT: production
  INFISICAL_SECRET_PATH: /
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN }}

jobs:
  # ── Build & Push Docker Images ─────────────────────────────────────────────
  build:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.should_build == 'true'
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub credentials
        id: docker-creds
        shell: bash
        env:
          DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ env.DOCKER_PASSWORD }}
        run: |
          if [ -z "${DOCKER_USERNAME}" ] || [ -z "${DOCKER_PASSWORD}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        if: ${{ steps.docker-creds.outputs.available == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Generate image tags
        if: ${{ steps.docker-creds.outputs.available == 'true' }}
        id: tags
        env:
          DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "backend_tags=${DOCKER_USERNAME}/${{ env.BACKEND_IMAGE }}:latest,${DOCKER_USERNAME}/${{ env.BACKEND_IMAGE }}:prod-$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Build & Push Unified Image
        if: ${{ steps.docker-creds.outputs.available == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: ${{ steps.docker-creds.outputs.available == 'true' }}
        run: |
          echo "### 🐳 Unified Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend & Frontend (Unified) | \`latest\`, \`prod-${{ steps.tags.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Summary when Docker Hub credentials are unavailable
        if: ${{ steps.docker-creds.outputs.available != 'true' }}
        run: |
          echo "### 🐳 Docker image push skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker Hub credentials were not configured for this run, so the publish step completed without pushing an image." >> $GITHUB_STEP_SUMMARY

  # ── Deploy to Production VPS ───────────────────────────────────────────────
  deploy:
    if: >-
      github.event.repository.fork != true &&
      (github.event_name == 'push' || github.event.inputs.should_deploy == 'true')
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}

    steps:
      - name: Resolve deployment prerequisites
        id: deploy-check
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ env.DOCKER_PASSWORD }}
        run: |
          missing=()

          [ -z "${PROD_SSH_HOST}" ] && missing+=("PROD_SSH_HOST")
          [ -z "${PROD_SSH_USER}" ] && missing+=("PROD_SSH_USER")
          [ -z "${PROD_SSH_KEY}" ] && missing+=("PROD_SSH_KEY")
          [ -z "${INFISICAL_TOKEN}" ] && missing+=("INFISICAL_TOKEN")
          [ -z "${INFISICAL_PROJECT_ID}" ] && missing+=("INFISICAL_PROJECT_ID")
          [ -z "${DOCKER_USERNAME}" ] && missing+=("DOCKER_USERNAME or DOCKERHUB_USERNAME")
          [ -z "${DOCKER_PASSWORD}" ] && missing+=("DOCKER_PASSWORD or DOCKERHUB_TOKEN")

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            printf 'missing=%s\n' "${missing[*]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        if: ${{ steps.deploy-check.outputs.available == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e

            cd ~/yaksha-faq || cd /opt/yaksha-faq

            echo "🔐 Logging in to Docker Hub on the production host..."
            echo "${{ env.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin

            export TAG=latest
            export DOCKERHUB_USERNAME=${{ env.DOCKER_USERNAME }}
            export INFISICAL_TOKEN="${{ secrets.INFISICAL_TOKEN }}"
            export INFISICAL_ENVIRONMENT=${{ env.INFISICAL_ENVIRONMENT }}
            export INFISICAL_PROJECT_ID="${{ secrets.INFISICAL_PROJECT_ID }}"
            export INFISICAL_SECRET_PATH=${{ env.INFISICAL_SECRET_PATH }}

            echo "📦 Pulling latest production unified image..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend

            echo "🚀 Deploying with docker-compose..."

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

            echo "🏥 Waiting for health check..."
            sleep 10
            curl -sf --max-time 10 http://localhost:6767/csfaq/api/health || echo "⚠️ Health check failed — check logs"

            echo "✅ Production deployment complete!"

      - name: Deployment Summary
        if: ${{ steps.deploy-check.outputs.available == 'true' }}
        run: |
          echo "### 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to production VPS at \`${{ secrets.PROD_SSH_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`latest\` tag" >> $GITHUB_STEP_SUMMARY

      - name: Deployment skipped summary
        if: ${{ steps.deploy-check.outputs.available != 'true' }}
        run: |
          echo "### 🚀 Production Deployment Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Missing deployment prerequisites: ${{ steps.deploy-check.outputs.missing }}" >> $GITHUB_STEP_SUMMARY
