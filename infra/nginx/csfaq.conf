# ═══════════════════════════════════════════════════════════════════════════════
# Yaksha FAQ Portal — nginx reference snippet (production VPS)
#
# This file is NOT deployed automatically. It is the canonical nginx
# config the platform expects. Drop it into /etc/nginx/sites-available/
# (or merge into your existing server block) and reload nginx:
#
#   sudo ln -sf /etc/nginx/sites-available/csfaq \
#                /etc/nginx/sites-enabled/csfaq
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Why this exists:
#   The browser enforces CSP as the INTERSECTION of every Content-
#   Security-Policy header it sees. If your app emits one CSP and
#   nginx adds a second, the browser enforces whichever is more
#   restrictive — and the default nginx behaviour (`add_header …
#   always`) WILL add a second CSP if you also `proxy_set_header`
#   the upstream one. So we explicitly do NOT add a CSP here, and
#   we DO proxy the upstream CSP unchanged.
#
#   The Express backend sets the CSP via res.setHeader() at the end
#   of the middleware chain (apps/backend/src/bootstrap/middleware.ts).
#   That single header is what reaches the browser.
#
# If you must add additional security headers here (HSTS preload,
# Permissions-Policy, etc.), keep them SEPARATE from the upstream
# CSP — i.e. use a different header name or guard against duplicates.
# ═══════════════════════════════════════════════════════════════════════════════

# Optional: when terminating TLS at nginx, force HTTPS for one year
# including subdomains. ENABLE ONLY when you are sure all subdomains
# are HTTPS-capable — HSTS preload list inclusion is hard to undo.
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com;        # ← change to your real hostname

    # ACME http-01 challenge path — keep at the top, before any rewrite.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Redirect everything else to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your.domain.com;        # ← change to your real hostname

    ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/csfaq.access.log;
    error_log  /var/log/nginx/csfaq.error.log warn;

    # ── Body size for multipart uploads ──────────────────────────────────────
    client_max_body_size 100m;

    # ── Proxy everything to the backend container (port 6767) ──────────────
    location / {
        proxy_pass         http://127.0.0.1:6767;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        # WebSocket / long-poll support (Discord bot sessions).
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;

        # ── CSP PROPAGATION ───────────────────────────────────────────────
        # DO NOT add a Content-Security-Policy header here. The backend
        # emits one (see apps/backend/src/bootstrap/middleware.ts) and
        # nginx MUST forward it unchanged. If nginx adds a second CSP,
        # the browser enforces the intersection — which is exactly how
        # the production bug "img-src 'self' data: blocked
        # https://res.cloudinary.com/..." was introduced.
        #
        # `proxy_pass_header` is the default behaviour, but listing it
        # explicitly makes the intent obvious to future maintainers.
        proxy_pass_header Content-Security-Policy;
        proxy_pass_header Strict-Transport-Security;
        proxy_pass_header X-Frame-Options;
        proxy_pass_header X-Content-Type-Options;
        proxy_pass_header Referrer-Policy;

        # Buffer large response bodies (uploads can be ~50 MB).
        proxy_buffering on;
        proxy_buffers   16 16k;
        proxy_buffer_size 32k;
    }
}

# WebSocket upgrade helper (kept in http context for nginx versions
# that don't auto-handle `Connection: upgrade`).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
